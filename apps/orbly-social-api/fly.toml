# fly.toml — https://fly.io/docs/reference/configuration/

app = 'orbly-social-api'
primary_region = 'gru'

[build]

[env]
  PORT = '8080'
  NODE_ENV = 'production'
  MONGO_DB_NAME = 'orbly'
  REDIS_ENABLED = 'false'
  # MONGO_URI, JWT_SECRET, CORS_ORIGIN → fly secrets set (aşağıdaki README / komutlar)

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
